name: Update garbage data

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update garbage.json
        run: python update_garbage.py

      - name: Commit and push changes
        run: |
          git config user.name "Ruei Yi"
          git config user.email "294120879+jyj8f6h6z6-hub@users.noreply.github.com"
          git add garbage.json
          git commit -m "Update garbage data" || echo "No changes to commit"
          git push