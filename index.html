<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台北垃圾車即時查詢</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="style.css?v=120">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-W784GKJ76H"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());

  gtag("config", "G-W784GKJ76H");
</script>
</head>

<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>台北垃圾車即時查詢</h1>
        <p id="dataStatus">資料載入中...</p>
        <p>找出你現在最快可趕上的垃圾車清運點</p>
        <button id="locateBtn">使用我的位置</button>
        <div class="search-section">
        <label for="addressSearch">地址搜尋</label>

        <div class="search-row">
          <input
            id="addressSearch"
            type="text"
            placeholder="台北車站、台北101、松山機場"
            autocomplete="off"
          />
          <button id="addressSearchBtn" type="button">搜尋</button>
        </div>

        <div id="message" class="search-message"></div>
      </div>
      </header>

      <section id="result">
        請點「使用我的位置」
      </section>

    </aside>

    <main id="mapArea">
      <div id="map"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js?v=120"></script>
</body>
</html>
